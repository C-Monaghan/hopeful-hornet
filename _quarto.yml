project:
  title: "Markov Residuals"
  type: website
  output-dir: "docs"
  # pre-render:
    # - "quarto render manuscript"

  render:
    - "**/*.qmd"
    # - "!manuscript"

  resources:
   # We need to include the libs folder so that the html file renders correctly
    - "manuscript/output/manuscript_files"
    - "manuscript/output/"

  preview:
    port: 44
    browser: true
    watch-inputs: false
    navigate: true

execute:
  freeze: auto  # Re-render only when source changes

website:
  repo-url: "https://github.com/C-Monaghan/hopeful-hornet"
  repo-actions: [edit, issue]

  page-navigation: true
  bread-crumbs: false

  navbar:
    pinned: true
    background: primary
    search: true

    left:
      - text: Data
        file: simulation/dataset.qmd
      - text: Manuscript
        menu:
          - simulation/paper.qmd
          - simulation/appendix.qmd
      # - text: Placeholder

    right:
      - icon: github
        aria-label: github
        href: https://github.com/C-Monaghan/hopeful-hornet

  sidebar:
    - title: Placeholder

  page-footer:
    left:  |
      Content {{< fa brands creative-commons >}} 2025–2026 by Cormac Monaghan,
      Idemauro Antonio Rodrigues de Lara, Rafael de Andrade Moral, and Joanna
      McHugh Power<br>
      All content licensed under a {{< fa brands creative-commons >}}
      {{< fa brands creative-commons-by >}}
      [Creative Commons Attribution 4.0 International license (CC BY 4.0)](https://creativecommons.org/licenses/by/4.0/)
    right: |
      Made with {{< fa brands r-project >}} and [Quarto](https://quarto.org/)<br>
      [View the source at {{< fa brands github >}} GitHub](https://github.com/C-Monaghan/crisp-clam)

format:
  html:
    theme:
      - united
      - html/theme.scss
    toc: true
    toc-title: On this page
    toc-location: right
    code-tools: true
    code-copy: true
    highlight-style: monokai
